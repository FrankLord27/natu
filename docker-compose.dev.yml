services:
  postgres:
    image: postgres:16-alpine
    container_name: natu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: naturajm
      POSTGRES_USER: naturajm
      POSTGRES_PASSWORD: naturajm_dev
    ports:
      - "5432:5432"
    volumes:
      - natu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naturajm -d naturajm"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: natu_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - natu_minio_data:/data

volumes:
  natu_postgres_data:
  natu_minio_data:
