services:
  minio:
    image: minio/minio:latest
    container_name: local_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9004:9000" # API S3
      - "9005:9001" # Consola Web
    volumes:
      - minio_data:/data

volumes:
  minio_data:
